<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Lote Premiado</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .auth-card { max-width: 400px; width: 100%; }
    .auth-card h2 { text-align: center; margin-bottom: 1.5rem; }
    .auth-card .logo { display: block; text-align: center; margin-bottom: 1.5rem; font-size: 1.8rem; }
    .auth-links { text-align: center; margin-top: 1rem; font-size: 0.9rem; }
    .auth-links a { margin: 0 0.5rem; }
    .error-msg { color: var(--danger); font-size: 0.85rem; margin-top: 0.5rem; display: none; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="card auth-card">
      <a href="index.html" class="logo">Lote Premiado</a>
      <h2>Entrar</h2>
      <form id="login-form">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" class="form-control" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" class="form-control" placeholder="Sua senha" required>
        </div>
        <p id="error-msg" class="error-msg"></p>
        <button type="submit" class="btn btn-primary btn-block">Entrar</button>
      </form>
      <div class="auth-links">
        <a href="#" id="forgot-link">Esqueci minha senha</a> |
        <a href="register.html">Criar conta</a>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script>
    const form = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        await auth.signInWithEmailAndPassword(email, password);
        window.location.href = 'user/dashboard.html';
      } catch (err) {
        errorMsg.textContent = 'E-mail ou senha incorretos.';
        errorMsg.style.display = 'block';
      }
    });

    document.getElementById('forgot-link').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      if (!email) { errorMsg.textContent = 'Digite seu e-mail acima.'; errorMsg.style.display = 'block'; return; }
      try {
        await auth.sendPasswordResetEmail(email);
        alert('E-mail de recuperação enviado!');
      } catch (err) {
        errorMsg.textContent = 'Erro ao enviar e-mail de recuperação.';
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Conta - Lote Premiado</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .dash-header { display: flex; align-items: center; justify-content: space-between; margin: 2rem 0 1rem; flex-wrap: wrap; gap: 1rem; }
    .user-info { display: flex; align-items: center; gap: 1rem; }
    .user-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.2rem; color: #000; }
    .notif-item { padding: 0.75rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    .notif-item:last-child { border: none; }
    .notif-date { font-size: 0.75rem; color: var(--text-secondary); }
    .history-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .history-table th, .history-table td { padding: 0.6rem; text-align: left; border-bottom: 1px solid var(--border); }
    .history-table th { color: var(--text-secondary); }
    .profile-form { max-width: 500px; }
    .profile-photo { width: 80px; height: 80px; border-radius: 50%; background: var(--bg-primary); margin-bottom: 1rem; object-fit: cover; }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <a href="../index.html" class="logo">Lote Premiado</a>
      <nav class="nav-links">
        <a href="../index.html">Sorteios</a>
        <a href="#" onclick="logout()">Sair</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="dash-header">
      <div class="user-info">
        <div class="user-avatar" id="avatar-initials">U</div>
        <div>
          <h2 id="user-name">Carregando...</h2>
          <small style="color:var(--text-secondary)" id="user-email"></small>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="tab-sorteios">Sorteios em Aberto</button>
      <button class="tab-btn" data-tab="tab-meus">Meus Sorteios</button>
      <button class="tab-btn" data-tab="tab-historico">Histórico</button>
      <button class="tab-btn" data-tab="tab-perfil">Perfil</button>
      <button class="tab-btn" data-tab="tab-notif">Notificações</button>
    </div>

    <!-- Tab: Active Lotteries -->
    <div id="tab-sorteios" class="tab-content active">
      <div id="active-lotes" class="grid grid-3"></div>
    </div>

    <!-- Tab: My Participations -->
    <div id="tab-meus" class="tab-content">
      <div id="my-lotes"></div>
    </div>

    <!-- Tab: History -->
    <div id="tab-historico" class="tab-content">
      <table class="history-table">
        <thead><tr><th>Data</th><th>Sorteio</th><th>Números</th><th>Valor</th><th>Status</th></tr></thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>

    <!-- Tab: Profile -->
    <div id="tab-perfil" class="tab-content">
      <div class="card profile-form">
        <img class="profile-photo" id="profile-photo" src="https://via.placeholder.com/80" alt="Foto">
        <form id="profile-form">
          <div class="form-group">
            <label>ID do Usuário</label>
            <input type="text" class="form-control" id="profile-uid" readonly>
          </div>
          <div class="form-group">
            <label>Nome</label>
            <input type="text" class="form-control" id="profile-name">
          </div>
          <div class="form-group">
            <label>E-mail</label>
            <input type="email" class="form-control" id="profile-email">
          </div>
          <div class="form-group">
            <label>Nova Senha (deixe vazio para manter)</label>
            <input type="password" class="form-control" id="profile-password" placeholder="Nova senha">
          </div>
          <button type="submit" class="btn btn-primary">Salvar Alterações</button>
        </form>
        <button class="btn btn-danger" style="margin-top:1rem" onclick="logout()">Sair da Conta</button>
      </div>
    </div>

    <!-- Tab: Notifications -->
    <div id="tab-notif" class="tab-content">
      <div class="card" id="notif-list">
        <p style="color:var(--text-secondary)">Nenhuma notificação.</p>
      </div>
    </div>
  </main>

  <footer class="footer"><div class="container"><p>&copy; 2026 Lote Premiado</p></div></footer>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>

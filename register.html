<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Lote Premiado</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .auth-card { max-width: 400px; width: 100%; }
    .auth-card h2 { text-align: center; margin-bottom: 1.5rem; }
    .auth-card .logo { display: block; text-align: center; margin-bottom: 1.5rem; font-size: 1.8rem; }
    .auth-links { text-align: center; margin-top: 1rem; font-size: 0.9rem; }
    .error-msg { color: var(--danger); font-size: 0.85rem; margin-top: 0.5rem; display: none; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="card auth-card">
      <a href="index.html" class="logo">Lote Premiado</a>
      <h2>Criar Conta</h2>
      <form id="register-form">
        <div class="form-group">
          <label for="name">Nome completo</label>
          <input type="text" id="name" class="form-control" placeholder="Seu nome" required>
        </div>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" class="form-control" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6">
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirmar senha</label>
          <input type="password" id="confirm-password" class="form-control" placeholder="Repita a senha" required>
        </div>
        <p id="error-msg" class="error-msg"></p>
        <button type="submit" class="btn btn-primary btn-block">Cadastrar</button>
      </form>
      <div class="auth-links">
        <a href="login.html">Já tenho conta</a>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script>
    const form = document.getElementById('register-form');
    const errorMsg = document.getElementById('error-msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (password !== confirm) {
        errorMsg.textContent = 'As senhas não coincidem.';
        errorMsg.style.display = 'block';
        return;
      }
      try {
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        await cred.user.updateProfile({ displayName: name });
        await db.collection('users').doc(cred.user.uid).set({
          name, email, role: 'user', createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        window.location.href = 'user/dashboard.html';
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
